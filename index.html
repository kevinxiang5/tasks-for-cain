<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>cain — Sign In</title>
    <script>try{if(localStorage.getItem('theme')==='dark')document.documentElement.classList.add('dark')}catch(e){}</script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #f7f8fa;
            --bg-card: #ffffff;
            --border: #e2e8f0;
            --text: #1a202c;
            --text-muted: #718096;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --accent-text: #ffffff;
            --input-bg: #f1f5f9;
            --error: #e53e3e;
        }
        html.dark {
            --bg: #0f1117;
            --bg-card: #1a1d27;
            --border: #2d3148;
            --text: #e2e8f0;
            --text-muted: #718096;
            --input-bg: #13151f;
        }
        body {
            font-family: 'Outfit', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px 36px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        h1 { font-size: 1.7rem; font-weight: 800; margin-bottom: 6px; }
        .subtitle { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 28px; }
        label { display: block; font-size: 0.82rem; font-weight: 600; margin-bottom: 6px; color: var(--text-muted); }
        input[type="email"],
        input[type="password"] {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 0.95rem;
            color: var(--text);
            font-family: inherit;
            margin-bottom: 16px;
            outline: none;
            transition: border-color 0.15s;
        }
        input:focus { border-color: var(--accent); }
        .btn-primary {
            width: 100%;
            background: var(--accent);
            color: var(--accent-text);
            border: none;
            border-radius: 8px;
            padding: 11px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.15s;
        }
        .btn-primary:hover { background: var(--accent-hover); }
        .error-msg {
            color: var(--error);
            font-size: 0.82rem;
            margin-bottom: 14px;
            display: none;
        }
        .divider { text-align: center; color: var(--text-muted); font-size: 0.82rem; margin: 18px 0; }
        .btn-secondary {
            width: 100%;
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            border-radius: 8px;
            padding: 10px;
            font-size: 0.92rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.15s;
        }
        .btn-secondary:hover { background: rgba(99,102,241,0.08); }
    </style>
</head>
<body>
    <div class="card">
        <h1>cain</h1>
        <p class="subtitle">Sign in to your task planner</p>
        <div id="error-msg" class="error-msg"></div>
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
        <button class="btn-primary" id="signin-btn">Sign In</button>
        <div class="divider">or</div>
        <button class="btn-secondary" id="signup-btn">Create Account</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCN8wH8WMmXtFSN8yFAVrizTS7IqLQzWKg",
            authDomain: "steazyplanner.firebaseapp.com",
            projectId: "steazyplanner",
            storageBucket: "steazyplanner.firebasestorage.app",
            messagingSenderId: "231639329077",
            appId: "1:231639329077:web:4242cb4d5f9ff81b9fc47c"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        onAuthStateChanged(auth, (user) => {
            if (user) window.location.replace('/main_page.html');
        });

        function showError(msg) {
            const el = document.getElementById('error-msg');
            el.textContent = msg;
            el.style.display = 'block';
        }

        document.getElementById('signin-btn').addEventListener('click', async () => {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (err) {
                showError(err.message.replace('Firebase: ', '').replace(/ \(.*\)/, ''));
            }
        });

        document.getElementById('signup-btn').addEventListener('click', async () => {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            try {
                await createUserWithEmailAndPassword(auth, email, password);
            } catch (err) {
                showError(err.message.replace('Firebase: ', '').replace(/ \(.*\)/, ''));
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('signin-btn').click();
        });
    </script>
</body>
</html>
