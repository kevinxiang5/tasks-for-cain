<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>cain — Sign In</title>
    <script>try{if(localStorage.getItem('theme')==='dark')document.documentElement.classList.add('dark')}catch(e){}</script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #f7f8fa;
            --bg-card: #ffffff;
            --border: #e2e8f0;
            --text: #1a202c;
            --text-muted: #718096;
            --accent: #6366f1;
            --accent-hover: #4f46e5;
            --accent-text: #ffffff;
            --input-bg: #f1f5f9;
            --error: #e53e3e;
        }
        html.dark {
            --bg: #0f1117;
            --bg-card: #1a1d27;
            --border: #2d3148;
            --text: #e2e8f0;
            --text-muted: #718096;
            --input-bg: #13151f;
        }
        body {
            font-family: 'Outfit', system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 40px 36px;
            width: 100%;
            max-width: 380px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.08);
        }
        h1 { font-size: 1.7rem; font-weight: 800; margin-bottom: 6px; }
        .subtitle { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 28px; }
        label { display: block; font-size: 0.82rem; font-weight: 600; margin-bottom: 6px; color: var(--text-muted); }
        input[type="email"],
        input[type="password"] {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 12px;
            font-size: 0.95rem;
            color: var(--text);
            font-family: inherit;
            margin-bottom: 16px;
            outline: none;
            transition: border-color 0.15s;
        }
        input:focus { border-color: var(--accent); }
        .btn-primary {
            width: 100%;
            background: var(--accent);
            color: var(--accent-text);
            border: none;
            border-radius: 8px;
            padding: 11px;
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.15s;
        }
        .btn-primary:hover { background: var(--accent-hover); }
        .error-msg {
            color: var(--error);
            font-size: 0.82rem;
            margin-bottom: 14px;
            display: none;
        }
        .divider { text-align: center; color: var(--text-muted); font-size: 0.82rem; margin: 18px 0; }
        .btn-secondary {
            width: 100%;
            background: transparent;
            color: var(--accent);
            border: 1px solid var(--accent);
            border-radius: 8px;
            padding: 10px;
            font-size: 0.92rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.15s;
        }
        .btn-secondary:hover { background: rgba(99,102,241,0.08); }
        .btn-google {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: #fff;
            color: #3c4043;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px;
            font-size: 0.92rem;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.15s, box-shadow 0.15s;
            margin-bottom: 4px;
        }
        .btn-google:hover { background: #f8f9fa; box-shadow: 0 1px 4px rgba(0,0,0,0.12); }
        html.dark .btn-google { background: #2d3148; color: var(--text); border-color: var(--border); }
        html.dark .btn-google:hover { background: #363a56; }
        .google-icon { width: 18px; height: 18px; flex-shrink: 0; }
    </style>
</head>
<body>
    <div class="card">
        <h1>cain</h1>
        <p class="subtitle">Sign in to your task planner</p>
        <div id="error-msg" class="error-msg"></div>

        <button class="btn-google" id="google-btn">
            <svg class="google-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
                <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Continue with Google
        </button>

        <div class="divider">or sign in with email</div>

        <label for="email">Email</label>
        <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
        <button class="btn-primary" id="signin-btn">Sign In</button>
        <div class="divider">no account?</div>
        <button class="btn-secondary" id="signup-btn">Create Account</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDHADKVvJdT04Ugo_6wxLQuVqm-olkvUPA",
            authDomain: "kalshi-nono.firebaseapp.com",
            projectId: "kalshi-nono",
            storageBucket: "kalshi-nono.firebasestorage.app",
            messagingSenderId: "289225444824",
            appId: "1:289225444824:web:f474b88da50db4cb26b6ad"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const googleProvider = new GoogleAuthProvider();

        onAuthStateChanged(auth, (user) => {
            if (user) window.location.replace('/main_page.html');
        });

        function showError(msg) {
            const el = document.getElementById('error-msg');
            el.textContent = msg;
            el.style.display = 'block';
        }

        document.getElementById('google-btn').addEventListener('click', async () => {
            try {
                await signInWithPopup(auth, googleProvider);
            } catch (err) {
                if (err.code !== 'auth/popup-closed-by-user' && err.code !== 'auth/cancelled-popup-request') {
                    showError('Google sign-in failed. Please try again.');
                }
            }
        });

        document.getElementById('signin-btn').addEventListener('click', async () => {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (err) {
                showError(err.message.replace('Firebase: ', '').replace(/ \(.*\)/, ''));
            }
        });

        document.getElementById('signup-btn').addEventListener('click', async () => {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            try {
                await createUserWithEmailAndPassword(auth, email, password);
            } catch (err) {
                showError(err.message.replace('Firebase: ', '').replace(/ \(.*\)/, ''));
            }
        });

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') document.getElementById('signin-btn').click();
        });
    </script>
</body>
</html>
